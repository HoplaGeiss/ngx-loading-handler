name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write  # required for npm provenance and trusted publishing

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for Trusted Publisher support
        run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - name: Build library
        run: pnpm exec ng build ngx-loading-handler

      - name: Sync root README to library
        run: cp README.md dist/ngx-loading-handler/README.md

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec semantic-release
